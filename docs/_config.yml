title: Fliplet Developers Documentation
description: Developer documentation for the Fliplet Platform — extending Fliplet Apps and building components, themes and menus.
url: https://developers.fliplet.com
logo: /assets/img/social.jpg?v2

twitter:
  card: summary_large_image
  username: flipletapp

# Default front-matter applied to every page. The `image` key feeds
# jekyll-seo-tag (v2.7.1) which only reads page-level image, not
# site-level. Setting it here gives every page a default og:image
# without editing every .md file.
defaults:
  - scope:
      path: ""
    values:
      image: /assets/img/social.jpg?v2

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

include:
  - _headers

# .well-known is intentionally NOT in `include:` — its contents are copied
# verbatim by bin/copy-md-siblings.mjs after Jekyll runs. Letting Jekyll
# touch it converts SKILL.md → SKILL.html (because they carry YAML
# frontmatter), which would break the URLs we publish in agent-skills
# index.json.
exclude:
  - docsearch
  - bin
  - test
  - Gemfile
  - Gemfile.lock
  - package.json
  - node_modules
  - CLAUDE.md
  - .well-known
  # mcp-worker/ is the Cloudflare Worker source. Its README is dev
  # documentation for the Worker, not a public doc — excluding it
  # stops Jekyll indexing it (and stops jekyll-sitemap listing
  # /mcp-worker/README which 404s on the live site).
  - mcp-worker
